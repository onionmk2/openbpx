name: auto-tag-release

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: auto-tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-tag:
    if: ${{ github.repository == 'wilddogjp/openbpx' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Resolve release tag from bpx version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(go run ./cmd/bpx version | tr -d '\r\n')"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: unexpected bpx version format: ${version}" >&2
            exit 1
          fi
          tag="v${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check whether tag already exists
        id: existing
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tagged_sha="$(git rev-list -n1 "${tag}")"
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "tagged_sha=${tagged_sha}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "exists=false" >> "${GITHUB_OUTPUT}"

      - name: Verify release guards before tagging
        if: ${{ steps.existing.outputs.exists != 'true' }}
        run: |
          ./scripts/check-version-tag.sh "${{ steps.version.outputs.tag }}"
          ./scripts/check-changelog-entry.sh "${{ steps.version.outputs.tag }}"

      - name: Create and push release tag
        if: ${{ steps.existing.outputs.exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          if git push origin "refs/tags/${tag}"; then
            exit 0
          fi
          git fetch --force --tags
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag ${tag} was created by another concurrent run; treating as success"
            exit 0
          fi
          echo "error: failed to push tag ${tag}" >&2
          exit 1

      - name: Summary
        shell: bash
        run: |
          {
            echo "### auto-tag-release result"
            echo ""
            echo "- commit: \`${{ github.sha }}\`"
            echo "- bpx version: \`${{ steps.version.outputs.version }}\`"
            echo "- candidate tag: \`${{ steps.version.outputs.tag }}\`"
            echo "- tag already existed: \`${{ steps.existing.outputs.exists }}\`"
            if [[ "${{ steps.existing.outputs.exists }}" == "true" ]]; then
              echo "- existing tag commit: \`${{ steps.existing.outputs.tagged_sha }}\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
